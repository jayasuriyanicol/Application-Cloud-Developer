server:
  port: 8081

spring:
  application:
    name: "MM-catalogo-RD"
  config:
    import: "optional:configserver:http://localhost:8071"
  cloud:
    config:
      enabled: false 
    
    #Configuration of Kafka RD from the Kafka WR
    stream:
      bindings:
       
        #NB: The input Bean have to adapt exactly to the WR one : destination
        input-in-0:
          destination: "prodotto-stream-catalog"
          group: "catalogo-group"
          content-type: "application/json"
      kafka:
        binder:
          brokers: "localhost:9092"
          auto-create-topics: true

  profiles:
    active: dev

  #Adapting the DB RD to reiceve the message -> "db_catalogo_rd_dev"
  datasource:
    url: "jdbc:postgresql://localhost:5432/db_catalogo_rd_dev" 
    username: "postgres"
    password: "postgres"
    driver-class-name: "org.postgresql.Driver"

  jpa:
    hibernate:
      ddl-auto: "update"
    show-sql: true
    properties:
      hibernate:
        dialect: "org.hibernate.dialect.PostgreSQLDialect"