<!-- *AFTER: Balanced DOM Tree & Flexbox Action Boundary 
 ?The layout structure was corrected by applying a dedicated .filters-actions container wrapper. A precise margin-bottom: 22px property was implemented inline
 ?to neutralize the invisible error/hint padding of the adjacent Material outline inputs, restoring a perfect vertical in the form FILTRA. -->


<section class="card mat-elevation-z1">
  <div class="toolbar">
    <div class="toolbar-copy">
      <h2>Elenco scuole</h2>
    </div>
    
    <div class="toolbar-filters" style="display: flex; align-items: center; gap: 8px;">
      <mat-form-field appearance="outline" class="search-field">
        <mat-label>Cerca scuola</mat-label>
        <input matInput [(ngModel)]="searchValue" (ngModelChange)="onSearchChange()" />
      </mat-form-field>

      <div class="filters-actions" style="margin-bottom: 22px;">
        <button
          mat-stroked-button
          type="button"
          (click)="exportToExcel()"
          [disabled]="isLoading || !visibleScuole.length"
          style="height: 48px;">
          <mat-icon role="img" aria-hidden="true">download</mat-icon>
          <span class="mdc-button__label">Esporta Excel</span>
        </button>
      </div>
    </div> </div> <div class="summary-row" *ngIf="!isLoading && allScuole.length > 0">
    <div class="summary-total">
      <span class="summary-label">Totale</span>
      <strong>{{ allScuole.length }}</strong>
    </div>
  </div>
</section>
